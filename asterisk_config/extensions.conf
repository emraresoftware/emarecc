; OpenCC - Asterisk Dialplan
; Dahili numaralar users.extension ile eşleşir (1000, 1001, 1002...)

[general]
static=yes
writeprotect=no
clearglobalvars=no

; Makro: çağrı kaydı (Queue ve Dial M() ile kullanılır)
[macro-record]
exten => s,1,MixMonitor(${UNIQUEID}.wav,b)
 same => n,Return()

; Basit IVR - Opsiyonel: Trunk'ı ivr-main,s,1'e yönlendirerek kullanın
; 1 = Destek, 2 = Satış (her ikisi de cc-support kuyruğuna)
[ivr-main]
exten => s,1,Answer()
 same => n,Playback(beep)
 same => n,Read(DIGIT,beep,1,,,5)
 same => n,GotoIf($["${DIGIT}"="1"]?support,1)
 same => n,GotoIf($["${DIGIT}"="2"]?sales,1)
 same => n,Goto(support,1)
exten => support,1,Queue(cc-support,t,,,30)
 same => n,Hangup()
exten => sales,1,Queue(cc-support,t,,,30)
 same => n,Hangup()

; Geri arama aynı dahiliye: AMI Redirect ile yönlendirilir (ilk 0.5s içinde)
[direct-to-agent]
exten => _X.,1,NoOp(Direct to agent ${EXTEN})
 same => n,Set(CHANNEL(language)=tr)
 same => n,Dial(PJSIP/${EXTEN},30)
 same => n,Hangup()

; FCT veya PSTN trunk'ından gelen çağrılar (pjsip context=from-pstn)
; Answer() yok — agent açana kadar arayan çalma sesi duyar
[from-pstn]
exten => _X.,1,NoOp(FCT/PSTN gelen: ${CALLERID(num)})
 same => n,Set(CHANNEL(language)=tr)
 same => n,Ringing()
 same => n,Queue(cc-support,tr,,,60)
 same => n,Hangup()

[default]
; Gelen çağrı - direkt kuyruğa (IVR kullanmak için trunk'ı ivr-main'e yönlendirin)
; Answer() yok — agent açana kadar arayan çalma sesi duyar
exten => _X.,1,NoOp(Gelen cagri: ${CALLERID(num)})
 same => n,Set(CHANNEL(language)=tr)
 same => n,Queue(cc-support,tr,,,60)
 same => n,Hangup()

[from-internal]
; Dahili araması - 9 + numara ile dış arama (FCT trunk üzerinden PSTN)
; GoIP16 Trunk Gateway Mode: prefix gerekmez, sadece numara gönderilir
exten => _9.,1,NoOp(Dis arama: ${EXTEN:1})
 same => n,Set(DST=${EXTEN:1})
 same => n,ExecIf($[${LEN(${DST})}=10]?Set(DST=0${DST}))
 same => n,ExecIf($[${LEN(${DST})}=12 & "${DST:0:2}"="90"]?Set(DST=0${DST:2}))
 same => n,NoOp(FCT Trunk GW arama hedef: ${DST})
 same => n,Dial(PJSIP/${DST}@fct-trunk,30)
 same => n,GotoIf($["${DIALSTATUS}"="CHANUNAVAIL" | "${DIALSTATUS}"="CONGESTION" | "${DIALSTATUS}"="NOANSWER"]?fallback)
 same => n,Hangup()
 same => n(fallback),NoOp(FCT fallback: ${DST})
 same => n,Dial(PJSIP/fct-trunk/sip:${DST}@192.168.1.100:5060,30)
 same => n,Hangup()

; Dahilden dahile (tüm 1XXX endpointleri)
exten => _1XXX,1,NoOp(Dahili ${EXTEN} aranıyor)
 same => n,Dial(PJSIP/${EXTEN},30)
 same => n,Hangup()

; Attended/Warm transfer: Kısa uyarı + hedefe yönlendir (please-hold yoksa beep)
[transfer-announce]
exten => _X.,1,NoOp(Attended transfer to ${EXTEN})
 same => n,Playback(beep)
 same => n,Goto(from-internal,${EXTEN},1)

[macro-dial-one]
; Originate için kullanılabilir - tek hedef arama
exten => s,1,Dial(${ARG1},${ARG2})
