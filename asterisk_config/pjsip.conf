; ========== FCT / PSTN Trunk (192.168.1.100) ==========
[fct-trunk]
type=endpoint
context=from-pstn
disallow=all
allow=ulaw
allow=alaw
transport=transport-udp
aors=fct-trunk
auth=fct-auth
direct_media=no
force_rport=yes
rewrite_contact=yes
rtp_symmetric=yes

[fct-identify]
type=identify
endpoint=fct-trunk
match=192.168.1.100
match=149.34.200.122

[fct-auth]
type=auth
auth_type=userpass
username=fct-trunk
password=fct123

[fct-trunk]
type=aor
max_contacts=5
remove_existing=yes
qualify_frequency=60
contact=sip:192.168.1.100:5060
