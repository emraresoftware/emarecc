[global]
type=global
endpoint_identifier_order=ip,username,anonymous

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
external_media_address=192.168.1.64
external_signaling_address=192.168.1.64
local_net=172.19.0.0/16
local_net=127.0.0.0/8

[transport-wss]
type=transport
protocol=wss
bind=0.0.0.0
external_media_address=192.168.1.64
external_signaling_address=192.168.1.64
local_net=172.19.0.0/16
local_net=127.0.0.0/8

[transport-ws]
type=transport
protocol=ws
bind=0.0.0.0
external_media_address=192.168.1.64
external_signaling_address=192.168.1.64
local_net=172.19.0.0/16
local_net=127.0.0.0/8

; ========== WebRTC Endpoint Sablonu ==========
[webrtc-endpoint](!)
type=endpoint
context=from-internal
disallow=all
allow=opus,ulaw,alaw
transport=transport-wss
webrtc=yes
dtls_auto_generate_cert=yes
dtls_verify=no
direct_media=no
force_rport=yes
rewrite_contact=yes
rtp_symmetric=yes
ice_support=yes
media_encryption=dtls
media_use_received_transport=yes
trust_id_inbound=yes
send_rpid=yes

[webrtc-aor](!)
type=aor
max_contacts=5
remove_existing=yes
qualify_frequency=0

; ========== Dahili WebRTC Endpointleri ==========

[1000](webrtc-endpoint)
auth=auth-1000
aors=1000

[auth-1000]
type=auth
auth_type=userpass
username=1000
password=webrtc123

[1000](webrtc-aor)

