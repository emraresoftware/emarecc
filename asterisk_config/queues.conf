; OpenCC - Asterisk Queue Tanımları
; Dahiller 1000, 1001, 1002 vb. ile tanımlı olmalı (users.extension)

[general]
persistentmembers=yes
autofill=yes
monitor-type=MixMonitor
monitor-format=wav
monitor-join=yes

[cc-support]
strategy=ringall
ringinuse=no
timeout=30
retry=5
wrapuptime=10
maxlen=0
weight=0
timeoutrestart=no
announce-frequency=0
announce-holdtime=no
announce-position=yes
queue-youarenext=queue-youarenext
queue-thereare=queue-thereare
queue-callswaiting=queue-callswaiting
queue-holdtime=queue-holdtime
queue-minutes=queue-minutes
queue-seconds=queue-seconds
queue-thankyou=queue-thankyou
periodic-announce=queue-periodic-announce
periodic-announce-frequency=60
ringinuse=no
memberdelay=1
reportholdtime=yes

; Ajan dahilileri - gelen arama bu numaralara düşer (OpenCC users.extension ile eşleşmeli)
; PJSIP endpoint adı: 1000, 1001, ... (pjsip.conf)
member => PJSIP/1000
member => PJSIP/1001
member => PJSIP/1002
member => PJSIP/1003
member => PJSIP/1004
member => PJSIP/1005
member => PJSIP/1006
member => PJSIP/1007
member => PJSIP/1008
member => PJSIP/1009
member => PJSIP/1010
