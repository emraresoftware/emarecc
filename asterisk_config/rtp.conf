; Emare CC — RTP Port Ayarları
; ⚠️ KRİTİK: Bu aralık docker-compose.yml'deki UDP port mapping ile EŞLEŞMELİ
; Docker: 10000-10050:10000-10050/udp  → rtp.conf: 10000-10050
; Eşleşmezse tek yönlü ses olur (GoIP RTP Asterisk'e ulaşamaz)

[general]
rtpstart=10000
rtpend=10050
; STUN — LAN ortamında gerekli değil, gerekirse aç
; stunaddr=stun.l.google.com:19302
rtcpinterval=5000
strictrtp=yes
icesupport=yes
