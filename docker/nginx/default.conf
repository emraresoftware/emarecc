# HTTP → HTTPS yönlendirme (ayrı port)
server {
    listen 80;
    server_name _;
    return 301 https://$host:3783$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/ssl/certs/asterisk.crt;
    ssl_certificate_key /etc/ssl/certs/asterisk.key;

    # Safari bazen aynı porta düz HTTP gönderebilir — 497 hatası ile yakala
    error_page 497 =301 https://$host:3783$request_uri;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy — preserve the /api prefix when proxying to backend
    location /api/ {
        # Do not include a trailing slash in proxy_pass so the original
        # request URI (including /api/) is forwarded to the backend.
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # socket.io websocket proxy
    location /socket.io/ {
        proxy_pass http://backend:5000/socket.io/;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Asterisk WSS proxy — tarayıcıdan gelen SIP WebSocket trafiği
    # nginx TLS'i terminate eder, arka tarafta düz WS (8088) kullanılır
    location /ws {
        proxy_pass http://asterisk:8088/ws;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # static files (already served from root)
}
