services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: callcenter_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  asterisk:
    image: andrius/asterisk:latest
    volumes:
      - ./asterisk_config:/etc/asterisk
      - ./recordings:/var/spool/asterisk/monitor
    cap_add:
      - SYS_PTRACE
      - NET_ADMIN
    ports:
      - "5038:5038"   # AMI
      - "5060:5060/udp"   # SIP
      - "10000-10020:10000-10020/udp"   # RTP
      - "8088:8088"   # HTTP / WebSocket (ws)
      - "8089:8089"   # HTTPS / WebSocket (wss)
    depends_on:
      db:
        condition: service_healthy

  backend:
    build: ./backend
    command: sh -c "node scripts/migrate.js && node scripts/seed.js && node dist/index.js"
    ports:
      - "5001:5000"
    volumes:
      - ./recordings:/recordings:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      asterisk:
        condition: service_started
    environment:
      NODE_ENV: development
      RECORDINGS_PATH: /recordings
      PORT: 5000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: secret
      DB_NAME: callcenter_db
      REDIS_URL: redis://redis:6379
      AMI_HOST: asterisk
      AMI_PORT: 5038
      AMI_USER: admin
      AMI_SECRET: Emre2025**
      AMI_DIAL_TRUNK: fct-trunk
      DEFAULT_AGENT_USERNAME: agent12
      JWT_SECRET: opencc-jwt-secret-change-in-production

  worker:
    build: ./backend
    command: npm run worker:prod
    volumes:
      - ./recordings:/recordings:ro
    environment:
      NODE_ENV: development
      RECORDINGS_PATH: /recordings
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: secret
      DB_NAME: callcenter_db
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        # .env'den okunur; boş bırakılırsa frontend relative URL kullanır (same-origin)
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_WS_URL: ${VITE_WS_URL:-}
        VITE_SIP_WS_URL: ${VITE_SIP_WS_URL:-}
        VITE_SIP_DOMAIN: ${VITE_SIP_DOMAIN:-}
        VITE_SIP_SECRET: ${VITE_SIP_SECRET:-webrtc123}
  # frontend is served via nginx reverse proxy (internal)
    depends_on:
      - backend
    volumes:
      - ./asterisk_config/keys:/etc/ssl/certs:ro
    command: ["sh", "-c", "if [ -f /etc/ssl/certs/asterisk.crt ] && [ -f /etc/ssl/certs/asterisk.key ]; then serve -s dist --ssl-cert /etc/ssl/certs/asterisk.crt --ssl-key /etc/ssl/certs/asterisk.key -l 3000; else serve -s dist -l 3000; fi"]

  web:
    image: nginx:alpine
    ports:
      - "3783:443"
      - "3000:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./asterisk_config/keys:/etc/ssl/certs:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  redis_data:
